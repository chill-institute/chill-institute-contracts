name: Publish Package

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install: true

      - name: Ensure release tag matches package version
        run: |
          node -e 'const pkg = require("./package.json"); const tag = process.env.RELEASE_TAG; if (tag !== `v${pkg.version}`) { throw new Error(`release tag ${tag} does not match package.json version v${pkg.version}`); }'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Configure npm auth
        run: |
          cat > "$HOME/.npmrc" <<'EOF'
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
